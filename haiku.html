<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>俳句・川柳</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a1510;
      font-family: 'Noto Serif JP', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── 背景パーティクル ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .petal {
      position: absolute;
      top: -40px;
      font-size: 1.1rem;
      opacity: 0;
      animation: petalFall linear infinite;
    }

    @keyframes petalFall {
      0%   { opacity: 0;   transform: translateY(0)   rotate(0deg)   translateX(0); }
      8%   { opacity: 0.7; }
      92%  { opacity: 0.5; }
      100% { opacity: 0;   transform: translateY(110vh) rotate(540deg) translateX(40px); }
    }

    /* ── 和紙カード ── */
    #card {
      position: relative;
      z-index: 10;
      width: min(92vw, 520px);
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 28px,
          rgba(180,160,120,0.07) 28px,
          rgba(180,160,120,0.07) 29px
        ),
        linear-gradient(135deg, #f7f0e0 0%, #ede0c4 40%, #e8d8b8 100%);
      border-radius: 4px;
      padding: 3rem 2.5rem 2.5rem;
      box-shadow:
        0 4px 6px rgba(0,0,0,0.4),
        0 12px 40px rgba(0,0,0,0.5),
        inset 0 0 60px rgba(180,150,100,0.15);
      border: 1px solid rgba(160,130,80,0.3);
    }

    /* 折り目の演出 */
    #card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 28px 28px 0;
      border-color: transparent rgba(140,110,70,0.35) transparent transparent;
    }

    /* ── ジャンルラベル ── */
    #genre-label {
      position: absolute;
      top: -1px;
      left: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: #f7f0e0;
      background: #7a5c30;
      padding: 0.25rem 0.8rem;
      border-radius: 0 0 3px 3px;
      opacity: 0;
      transition: opacity 0.8s;
    }

    /* ── 句のコンテナ ── */
    #poem-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      min-height: 160px;
      justify-content: center;
    }

    /* ── 1行ずつ ── */
    .poem-line {
      display: flex;
      justify-content: center;
      flex-wrap: nowrap;
      line-height: 2.2;
    }

    /* ── 1文字ずつ ── */
    .char {
      display: inline-block;
      font-size: clamp(1.6rem, 4.5vw, 2.6rem);
      font-weight: 400;
      color: #2a1f10;
      letter-spacing: 0.15em;
      opacity: 0;
      transform: translateY(-14px) scale(0.85);
      transition: opacity 0.55s ease, transform 0.55s ease;
      text-shadow: 1px 2px 4px rgba(0,0,0,0.12);
    }

    .char.space {
      width: 0.5em;
    }

    .char.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* 区切り線 */
    .line-sep {
      width: 60%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(120,90,50,0.3), transparent);
      margin: 0.5rem auto;
      opacity: 0;
      transition: opacity 0.8s;
    }

    .line-sep.show { opacity: 1; }

    /* ── 作者・季語エリア ── */
    #meta {
      margin-top: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      transition: opacity 1s;
    }

    #meta.show { opacity: 1; }

    #author {
      font-size: 0.8rem;
      color: #7a5c30;
      letter-spacing: 0.25em;
    }

    #kigo {
      font-size: 0.7rem;
      color: rgba(120,90,50,0.7);
      letter-spacing: 0.2em;
    }

    /* ── ナビゲーション ── */
    #nav {
      position: relative;
      z-index: 10;
      margin-top: 2.2rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .btn {
      background: rgba(240,220,180,0.1);
      border: 1px solid rgba(240,220,180,0.35);
      color: #e8d0a0;
      padding: 0.45rem 1.3rem;
      font-family: 'Noto Serif JP', serif;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.25s, border-color 0.25s;
      user-select: none;
    }

    .btn:hover { background: rgba(240,220,180,0.2); border-color: rgba(240,220,180,0.6); }

    #counter {
      font-size: 0.7rem;
      color: rgba(240,220,180,0.45);
      letter-spacing: 0.2em;
      min-width: 3.5rem;
      text-align: center;
    }

    /* ── 自動再生リング ── */
    #auto-ring {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 44px;
      height: 44px;
      cursor: pointer;
      z-index: 20;
    }

    #auto-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    #auto-ring .track { fill: none; stroke: rgba(240,220,180,0.15); stroke-width: 2.5; }
    #auto-ring .prog  {
      fill: none;
      stroke: rgba(200,170,100,0.75);
      stroke-width: 2.5;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.08s linear;
    }

    #auto-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: rgba(200,170,100,0.8);
    }

    /* ── フェードオーバーレイ ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: #1a1510;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #overlay.active { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

<div id="particles"></div>
<div id="overlay"></div>

<div id="card">
  <div id="genre-label">俳句</div>
  <div id="poem-wrap"></div>
  <div id="meta">
    <span id="author"></span>
    <span id="kigo"></span>
  </div>
</div>

<div id="nav">
  <button class="btn" id="btn-prev">◁ 前</button>
  <span id="counter"></span>
  <button class="btn" id="btn-next">次 ▷</button>
</div>

<div id="auto-ring" title="自動再生 / 停止">
  <svg viewBox="0 0 44 44">
    <circle class="track" cx="22" cy="22" r="18"/>
    <circle class="prog"  cx="22" cy="22" r="18" id="ring-fill"/>
  </svg>
  <div id="auto-icon">▶</div>
</div>

<script>
const POEMS = [
  { lines:["古池や","蛙飛び込む","水の音"],      author:"松尾芭蕉", kigo:"蛙（春）", genre:"俳句", petal:"🌸", color:"#4a8a6a" },
  { lines:["柿食えば","鐘が鳴るなり","法隆寺"],  author:"正岡子規", kigo:"柿（秋）", genre:"俳句", petal:"🍂", color:"#b05030" },
  { lines:["夏草や","兵どもが","夢の跡"],        author:"松尾芭蕉", kigo:"夏草（夏）", genre:"俳句", petal:"🌿", color:"#3a7a50" },
  { lines:["雪とけて","村いっぱいの","子どもかな"],author:"小林一茶", kigo:"雪解（春）", genre:"俳句", petal:"❄️",  color:"#5080a0" },
  { lines:["菜の花や","月は東に","日は西に"],    author:"与謝蕪村", kigo:"菜の花（春）", genre:"俳句", petal:"🌼", color:"#a0902a" },
  { lines:["閑かさや","岩にしみ入る","蝉の声"],  author:"松尾芭蕉", kigo:"蝉（夏）", genre:"俳句", petal:"🌿", color:"#3a6a30" },
  { lines:["目には青葉","山ほととぎす","初鰹"],  author:"山口素堂", kigo:"青葉（夏）", genre:"俳句", petal:"🌿", color:"#508060" },
  { lines:["春の海","ひねもすのたり","のたりかな"],author:"与謝蕪村", kigo:"春の海（春）", genre:"俳句", petal:"🌸", color:"#406090" },
  { lines:["名月を","取ってくれろと","泣く子かな"],author:"小林一茶", kigo:"名月（秋）", genre:"俳句", petal:"🍁", color:"#907040" },
  { lines:["世の中は","三日見ぬ間に","桜かな"],  author:"大島蓼太", kigo:"桜（春）", genre:"俳句", petal:"🌸", color:"#b07090" },
  { lines:["目薬を","さして涙の","出ない人"],    author:"江戸川柳", kigo:"", genre:"川柳", petal:"💧", color:"#406080" },
  { lines:["親の意見と","茄子の花は","千に一つも"], author:"江戸川柳", kigo:"", genre:"川柳", petal:"🍆", color:"#504080" },
  { lines:["花より団子","色より食の","まさること"], author:"江戸川柳", kigo:"", genre:"川柳", petal:"🌸", color:"#a06040" },
];

const C = 2 * Math.PI * 18;

let cur = 0;
let busy = false;
let autoPlaying = true;
let elapsed = 0;
const INTERVAL = 7000;
let ticker = null;

const overlay    = document.getElementById('overlay');
const poemWrap   = document.getElementById('poem-wrap');
const authorEl   = document.getElementById('author');
const kigoEl     = document.getElementById('kigo');
const metaEl     = document.getElementById('meta');
const genreLabel = document.getElementById('genre-label');
const counterEl  = document.getElementById('counter');
const ringFill   = document.getElementById('ring-fill');
const autoIcon   = document.getElementById('auto-icon');

function makeParticles(petal, n = 12) {
  const container = document.getElementById('particles');
  container.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'petal';
    el.textContent = petal;
    el.style.left = (Math.random() * 100) + 'vw';
    const dur = (Math.random() * 9 + 7).toFixed(1);
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random() * 6).toFixed(1) + 's';
    container.appendChild(el);
  }
}

function revealChars(poem) {
  poemWrap.innerHTML = '';
  metaEl.classList.remove('show');
  genreLabel.style.opacity = '0';

  const delays = [];
  let t = 0;
  const BASE = 110;
  const SEP  = 320;

  poem.lines.forEach((line, li) => {
    if (li > 0) {
      const sep = document.createElement('div');
      sep.className = 'line-sep';
      poemWrap.appendChild(sep);
      setTimeout(() => sep.classList.add('show'), t - 100);
    }

    const row = document.createElement('div');
    row.className = 'poem-line';
    poemWrap.appendChild(row);

    for (const ch of line) {
      const span = document.createElement('span');
      span.className = 'char' + (ch === '　' || ch === ' ' ? ' space' : '');
      span.textContent = ch;
      row.appendChild(span);

      const delay = t;
      delays.push({ el: span, delay });
      t += BASE + (Math.random() * 40 - 20);
    }
    t += SEP;
  });

  delays.forEach(({ el, delay }) => {
    setTimeout(() => el.classList.add('show'), delay);
  });

  const totalDelay = t + 200;

  authorEl.textContent = poem.author || '';
  kigoEl.textContent   = poem.kigo   ? '【' + poem.kigo + '】' : '';
  genreLabel.textContent = poem.genre;

  setTimeout(() => {
    metaEl.classList.add('show');
    genreLabel.style.opacity = '1';
  }, totalDelay);

  return totalDelay;
}

function show(index) {
  if (busy) return;
  busy = true;

  const poem = POEMS[index];
  counterEl.textContent = `${index + 1} / ${POEMS.length}`;

  overlay.classList.add('active');

  setTimeout(() => {
    makeParticles(poem.petal, 14);

    document.getElementById('card').style.boxShadow =
      `0 4px 6px rgba(0,0,0,0.4),
       0 12px 40px rgba(0,0,0,0.5),
       inset 0 0 80px ${poem.color}18`;

    overlay.classList.remove('active');

    const total = revealChars(poem);

    setTimeout(() => { busy = false; }, total + 400);
  }, 520);
}

function setRing(pct) {
  const offset = C * (1 - pct);
  ringFill.style.strokeDasharray  = C;
  ringFill.style.strokeDashoffset = offset;
}

function startAuto() {
  autoPlaying = true;
  autoIcon.textContent = '⏸';
  elapsed = 0;
  setRing(0);
  ticker = setInterval(() => {
    elapsed += 80;
    setRing(elapsed / INTERVAL);
    if (elapsed >= INTERVAL) {
      elapsed = 0;
      navigate(1);
    }
  }, 80);
}

function stopAuto() {
  autoPlaying = false;
  autoIcon.textContent = '▶';
  clearInterval(ticker);
  ticker = null;
  setRing(0);
}

function toggleAuto() {
  autoPlaying ? stopAuto() : startAuto();
}

function navigate(dir) {
  cur = (cur + dir + POEMS.length) % POEMS.length;
  show(cur);
  if (autoPlaying) { elapsed = 0; setRing(0); }
}

document.getElementById('btn-next').addEventListener('click', () => navigate(1));
document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
document.getElementById('auto-ring').addEventListener('click', toggleAuto);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
  if (e.key === ' ') { e.preventDefault(); toggleAuto(); }
});

let tx = null;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend',   e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
  tx = null;
});

show(0);
startAuto();
</script>
</body>
</html>
